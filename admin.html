<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Engagement RSVP Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ivory:#fffaf7;--blush:#f3e8e1;--gold:#b77a34;--deep:#87531f;--ink:#211b18;--soft:#665950;--line:#dfc19e;--white:#fff}
*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:Jost,sans-serif;background:radial-gradient(circle at 10% 0,rgba(183,122,52,.12),transparent 26rem),linear-gradient(180deg,var(--ivory),var(--blush));min-height:100vh}.shell{max-width:1100px;margin:auto;padding:42px 22px 70px}.top{display:flex;justify-content:space-between;align-items:end;gap:20px;margin-bottom:28px}.kicker{font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--deep)}h1{font:600 clamp(34px,6vw,54px)/1 'Cormorant Garamond',serif;margin:8px 0}.status{font-size:12px;color:var(--soft)}button{border:0;border-radius:999px;padding:12px 20px;background:linear-gradient(135deg,#c08a4a,#8c5723);color:white;font:500 11px Jost;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin:24px 0}.stat,.panel{background:rgba(255,255,255,.78);border:1px solid rgba(183,122,52,.28);box-shadow:0 14px 38px rgba(73,45,30,.08)}.stat{padding:20px;border-radius:8px}.num{font:600 34px 'Cormorant Garamond',serif;color:var(--deep)}.label{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--soft)}.panel{border-radius:10px;overflow:hidden}.scroll{overflow:auto}table{width:100%;border-collapse:collapse;min-width:850px}th,td{padding:14px 16px;text-align:left;border-bottom:1px solid rgba(183,122,52,.18);font-size:13px}th{background:#f5e9e1;font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--soft)}.pill{display:inline-block;padding:5px 10px;border-radius:999px;font-size:11px}.yes{background:#e3efe0;color:#39733b}.no{background:#f2e3df;color:#a54834}.empty,.error{padding:50px 22px;text-align:center;color:var(--soft)}.error{color:#a54834}.note{margin-top:18px;padding:16px 18px;border-left:3px solid var(--gold);background:rgba(255,255,255,.55);font-size:12px;line-height:1.6;color:var(--soft)}@media(max-width:700px){.top{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body><main class="shell"><header class="top"><div><div class="kicker">Private Administration</div><h1>RSVP Dashboard</h1><div class="status" id="status">Loading responses…</div></div><button id="refresh">Refresh</button></header><section class="stats"><div class="stat"><div class="num" id="total">0</div><div class="label">Responses</div></div><div class="stat"><div class="num" id="yes">0</div><div class="label">Attending</div></div><div class="stat"><div class="num" id="guests">0</div><div class="label">Total Guests</div></div><div class="stat"><div class="num" id="no">0</div><div class="label">Declined</div></div></section><section class="panel"><div id="content" class="empty">Loading responses…</div></section><div class="note" id="note"></div></main>
<script src="config.js"></script>
<script>
const STORAGE_KEY='hs-rsvp-2026-responses';
const URL=window.INVITATION_CONFIG?.APPS_SCRIPT_URL||'';
const configured=URL&&URL!=='YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';
const esc=v=>String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
function localRows(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return[]}}
function normalize(r){return {name:r.name||'',phone:r.phone||'',attending:String(r.attending||'').toLowerCase().startsWith('y')?'yes':String(r.attending||'').toLowerCase(),guestCount:Number(r.guestCount??r.guests??0),message:r.message||'',submittedAt:r.submittedAt||r.timestamp||''}}
function render(rows,source){rows=rows.map(normalize).sort((a,b)=>String(b.submittedAt).localeCompare(String(a.submittedAt)));const yes=rows.filter(r=>r.attending==='yes');document.querySelector('#total').textContent=rows.length;document.querySelector('#yes').textContent=yes.length;document.querySelector('#no').textContent=rows.filter(r=>r.attending==='no').length;document.querySelector('#guests').textContent=yes.reduce((s,r)=>s+r.guestCount,0);document.querySelector('#status').textContent=`${rows.length} response${rows.length===1?'':'s'} · ${source}`;document.querySelector('#note').textContent=configured?'Showing the shared Google Sheet response list. Use Refresh to load the latest submissions.':'Google Apps Script is not configured. Only responses saved in this same browser and website origin can be displayed.';document.querySelector('#content').innerHTML=rows.length?`<div class="scroll"><table><thead><tr><th>Submitted</th><th>Name</th><th>WhatsApp</th><th>Response</th><th>Guests</th><th>Message</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.submittedAt?new Date(r.submittedAt).toLocaleString():'')}</td><td>${esc(r.name)}</td><td>${esc(r.phone||'—')}</td><td><span class="pill ${r.attending==='yes'?'yes':'no'}">${r.attending==='yes'?'Attending':'Declined'}</span></td><td>${esc(r.guestCount)}</td><td>${esc(r.message||'—')}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">No RSVP responses have been received yet.</div>'}
async function load(){document.querySelector('#status').textContent='Loading responses…';if(!configured){render(localRows(),'this browser only');return}try{const res=await fetch(URL+'?action=list&ts='+Date.now(),{cache:'no-store'});if(!res.ok)throw Error('HTTP '+res.status);const data=await res.json();if(!data.ok)throw Error(data.error||'Unable to load responses');render(Array.isArray(data.responses)?data.responses:[],'shared Google Sheet')}catch(e){document.querySelector('#content').innerHTML='<div class="error">Could not load the shared RSVP list. Check the Apps Script deployment URL and permissions.</div>';document.querySelector('#status').textContent='Connection failed';document.querySelector('#note').textContent=e.message}}
document.querySelector('#refresh').addEventListener('click',load);load();
</script></body></html>
