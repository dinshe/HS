<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP Responses — Hasara & Shehara</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --off-white:#FBF8F3;
  --beige:#EFE6D4;
  --champagne:#F1E7D2;
  --gold:#C9A24A;
  --gold-deep:#A9812F;
  --gold-pale:#E4CE95;
  --silver:#9A9C9E;
  --silver-light:#D9DADB;
  --ink:#2B2620;
  --ink-soft:#5B5346;
  --white:#ffffff;
  --shadow-soft: 0 10px 40px rgba(43,38,32,0.08);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  background:linear-gradient(180deg, var(--off-white) 0%, var(--beige) 100%);
  color:var(--ink);
  font-family:'Jost', sans-serif;
  min-height:100vh;
}
.serif{font-family:'Cormorant Garamond', serif;}

.admin-wrap{
  max-width:760px;
  margin:0 auto;
  padding:48px 20px 80px;
}
.admin-header{
  text-align:center;
  margin-bottom:36px;
}
.admin-eyebrow{
  font-size:11px;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:var(--gold-deep);
  font-weight:500;
}
.admin-title{
  font-family:'Cormorant Garamond', serif;
  font-size:34px;
  margin-top:10px;
  color:var(--ink);
}
.admin-back{
  display:inline-block;
  margin-top:14px;
  font-size:12.5px;
  color:var(--ink-soft);
  text-decoration:none;
  border-bottom:1px solid var(--gold-pale);
  padding-bottom:2px;
}

.admin-stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:28px;
}
.admin-stat-card{
  background:rgba(255,255,255,0.7);
  border:1px solid var(--gold-pale);
  border-radius:14px;
  padding:20px 12px;
  text-align:center;
  box-shadow:var(--shadow-soft);
}
.admin-stat-num{
  font-family:'Cormorant Garamond', serif;
  font-size:32px;
  color:var(--gold-deep);
}
.admin-stat-label{
  font-size:9.5px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink-soft);
  margin-top:4px;
}

.admin-toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
  flex-wrap:wrap;
}
.admin-search{
  flex:1;
  min-width:180px;
  padding:11px 16px;
  border-radius:10px;
  border:1px solid var(--silver-light);
  background:rgba(255,255,255,0.8);
  font-family:'Jost', sans-serif;
  font-size:13.5px;
  outline:none;
}
.admin-search:focus{border-color:var(--gold);}

.btn-mini{
  padding:10px 16px;
  border-radius:10px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold-deep);
  font-family:'Jost', sans-serif;
  font-size:12.5px;
  font-weight:500;
  cursor:pointer;
  white-space:nowrap;
}
.btn-mini:hover{background:var(--champagne);}

.admin-table-card{
  background:rgba(255,255,255,0.7);
  border:1px solid var(--gold-pale);
  border-radius:16px;
  overflow-x:auto;
  box-shadow:var(--shadow-soft);
}
table.admin-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  min-width:560px;
}
.admin-table th{
  text-align:left;
  padding:14px 16px;
  background:var(--champagne);
  font-size:10px;
  letter-spacing:0.06em;
  text-transform:uppercase;
  color:var(--ink-soft);
  font-weight:500;
  white-space:nowrap;
}
.admin-table td{
  padding:13px 16px;
  border-top:1px solid var(--gold-pale);
  color:var(--ink);
  vertical-align:top;
}
.admin-table tr:hover td{background:rgba(255,255,255,0.5);}

.pill-yes, .pill-no{
  display:inline-block;
  padding:4px 12px;
  border-radius:999px;
  font-size:10.5px;
  font-weight:500;
  white-space:nowrap;
}
.pill-yes{background:#E4EFE0; color:#3E7A3E;}
.pill-no{background:#F2E4E0; color:#B5502F;}

.admin-empty{
  text-align:center;
  padding:60px 20px;
  color:var(--ink-soft);
  font-size:14px;
}
.admin-empty-icon{font-size:32px; margin-bottom:14px; opacity:0.5;}

.admin-note{
  font-size:11.5px;
  color:var(--ink-soft);
  opacity:0.7;
  margin-top:8px;
}
.msg-cell{
  max-width:220px;
  white-space:normal;
  font-style:italic;
  color:var(--ink-soft);
  font-size:12px;
}
</style>
</head>
<body>
  <div class="admin-wrap">
    <div class="admin-header">
      <div class="admin-eyebrow">Private · Hosts Only</div>
      <div class="admin-title serif">RSVP Responses</div>
      <a class="admin-back" href="index.html">← Back to invitation</a>
    </div>

    <div class="admin-stats" id="admin-stats"></div>

    <div class="admin-toolbar">
      <input class="admin-search" id="admin-search" type="text" placeholder="Search by name...">
      <button class="btn-mini" id="refresh-btn">↻ Refresh</button>
      <button class="btn-mini" id="export-btn">⭳ Export CSV</button>
    </div>

    <div id="admin-content"></div>
  </div>

<script>
// ============================================================
// SETUP REQUIRED: paste your Google Sheet's ID below.
//
// This is DIFFERENT from the Apps Script URL used in app.js — it's
// the ID of the actual spreadsheet. Find it in the Sheet's URL:
//   https://docs.google.com/spreadsheets/d/PASTE_THIS_PART/edit
//
// This page also requires the Sheet's sharing setting to be
// "Anyone with the link → Viewer". That does NOT make it editable
// by strangers — view-only means visitors can only read it, and
// only if they have this exact admin.html link, which you should
// keep private. Only you have the "Edit" link to the Sheet itself.
// ============================================================

const SHEET_ID = "1tPdgjuAZbixTTgFsp3CiWqzEUTPYOtD6F7sX-vlhR2M";

function isSheetConfigured(){
  return SHEET_ID && SHEET_ID !== "YOUR_GOOGLE_SHEET_ID_HERE";
}

let allData = [];

async function fetchData(){
  if(!isSheetConfigured()){
    return { data: [], configError: true };
  }

  const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=RSVPs`;

  try{
    const res = await fetch(csvUrl);
    if(!res.ok) throw new Error('Sheet fetch failed: ' + res.status);
    const csvText = await res.text();
    return { data: parseCSV(csvText), configError: false };
  }catch(e){
    console.error('Could not load the Sheet:', e);
    return { data: [], fetchError: true };
  }
}

// Minimal CSV parser that handles quoted fields containing commas,
// which guest messages will often have.
function parseCSV(text){
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;

  for(let i = 0; i < text.length; i++){
    const char = text[i];
    const next = text[i+1];

    if(inQuotes){
      if(char === '"' && next === '"'){ field += '"'; i++; }
      else if(char === '"'){ inQuotes = false; }
      else{ field += char; }
    }else{
      if(char === '"'){ inQuotes = true; }
      else if(char === ','){ row.push(field); field = ''; }
      else if(char === '\n' || char === '\r'){
        if(char === '\r' && next === '\n') i++;
        row.push(field); field = '';
        if(row.some(f => f.trim() !== '')) rows.push(row);
        row = [];
      }else{
        field += char;
      }
    }
  }
  if(field !== '' || row.length > 0){ row.push(field); rows.push(row); }

  if(rows.length === 0) return [];

  // First row is the header: Submitted At, Name, Attending, Guests, Phone, Message
  const dataRows = rows.slice(1);

  return dataRows.map(r => ({
    submittedAt: r[0] || '',
    name: r[1] || '',
    attending: (r[2] || '').toLowerCase() === 'yes' ? 'yes' : 'no',
    guestCount: parseInt(r[3], 10) || 0,
    phone: r[4] || '',
    message: r[5] || '',
  }));
}

function renderStats(data){
  const yes = data.filter(d => d.attending === 'yes');
  const no = data.filter(d => d.attending === 'no');
  const totalGuests = yes.reduce((sum, d) => sum + (d.guestCount || 1), 0);

  document.getElementById('admin-stats').innerHTML = `
    <div class="admin-stat-card">
      <div class="admin-stat-num">${totalGuests}</div>
      <div class="admin-stat-label">Total Attending</div>
    </div>
    <div class="admin-stat-card">
      <div class="admin-stat-num">${yes.length}</div>
      <div class="admin-stat-label">RSVPs Yes</div>
    </div>
    <div class="admin-stat-card">
      <div class="admin-stat-num">${no.length}</div>
      <div class="admin-stat-label">RSVPs No</div>
    </div>
  `;
}

function renderTable(data, state){
  const content = document.getElementById('admin-content');

  if(state && state.configError){
    content.innerHTML = `
      <div class="admin-table-card">
        <div class="admin-empty">
          <div class="admin-empty-icon">⚙</div>
          This page isn't connected to your Google Sheet yet.<br>
          <div class="admin-note">Open admin.html, find SHEET_ID near the top of the script, and paste in your Sheet's ID. See the comment right above it for exactly where to find it.</div>
        </div>
      </div>`;
    return;
  }

  if(state && state.fetchError){
    content.innerHTML = `
      <div class="admin-table-card">
        <div class="admin-empty">
          <div class="admin-empty-icon">⚠</div>
          Couldn't load the Sheet right now.<br>
          <div class="admin-note">Check that the Sheet's sharing is set to "Anyone with the link → Viewer", and that the sheet tab is named exactly "RSVPs". Then hit Refresh.</div>
        </div>
      </div>`;
    return;
  }

  if(data.length === 0){
    content.innerHTML = `
      <div class="admin-table-card">
        <div class="admin-empty">
          <div class="admin-empty-icon">✉</div>
          No responses yet — once guests start responding, they'll appear here.<br>
          <div class="admin-note">Hit Refresh any time to check for new ones.</div>
        </div>
      </div>`;
    return;
  }

  const sorted = [...data].sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));

  content.innerHTML = `
    <div class="admin-table-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Guests</th>
            <th>Phone</th>
            <th>Message</th>
            <th>Submitted</th>
          </tr>
        </thead>
        <tbody id="admin-tbody">
          ${sorted.map(rowHTML).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function rowHTML(d){
  let dateStr = d.submittedAt || '—';
  const parsed = new Date(d.submittedAt);
  if(!isNaN(parsed.getTime())){
    dateStr = parsed.toLocaleDateString('en-GB', {day:'numeric', month:'short'}) + ', ' + parsed.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  }
  return `
    <tr data-name="${(d.name||'').toLowerCase()}">
      <td>${escapeHTML(d.name || '—')}</td>
      <td>${d.attending === 'yes' ? '<span class="pill-yes">Attending</span>' : '<span class="pill-no">Not Attending</span>'}</td>
      <td>${d.attending === 'yes' ? (d.guestCount || 1) : '—'}</td>
      <td>${escapeHTML(d.phone || '—')}</td>
      <td class="msg-cell">${d.message ? escapeHTML(d.message) : '—'}</td>
      <td>${dateStr}</td>
    </tr>
  `;
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function exportCSV(data){
  if(data.length === 0){ alert('No responses to export yet.'); return; }
  const headers = ['Name','Attending','Guests','Phone','Message','Submitted'];
  const rows = data.map(d => [
    d.name || '',
    d.attending === 'yes' ? 'Yes' : 'No',
    d.attending === 'yes' ? (d.guestCount||1) : 0,
    d.phone || '',
    (d.message || '').replace(/"/g,'""'),
    d.submittedAt || ''
  ]);
  let csv = headers.join(',') + '\n';
  csv += rows.map(r => r.map(cell => `"${cell}"`).join(',')).join('\n');

  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'hasara-shehara-rsvps.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function load(){
  document.getElementById('admin-content').innerHTML = `<div class="admin-table-card"><div class="admin-empty">Loading responses…</div></div>`;
  const result = await fetchData();
  allData = result.data;
  renderStats(allData);
  renderTable(allData, result);
}

document.getElementById('refresh-btn').addEventListener('click', load);
document.getElementById('export-btn').addEventListener('click', () => exportCSV(allData));
document.getElementById('admin-search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('#admin-tbody tr').forEach(tr => {
    tr.style.display = tr.dataset.name.includes(q) ? '' : 'none';
  });
});

load();
</script>
</body>
</html>
